[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "taac2026"
version = "0.1.0"
description = "TAAC 2026 experiment workspace"
readme = "README.md"
requires-python = ">=3.12,<3.14"
dependencies = [
	"hypothesis>=6.142",
	"loguru>=0.7",
	"matplotlib>=3.10",
	"numpy>=2.1",
	"optuna>=4.4",
	"pyarrow>=18.0",
	"pytest>=8.3",
	"rich>=13.9",
	"torch>=2.6",
]

[tool.uv.sources]
torch = [
	{ index = "pytorch-cu128", marker = "platform_system == 'Linux'" },
]

[[tool.uv.index]]
name = "pypi"
url = "https://pypi.org/simple"
default = true

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[project.scripts]
taac-train = "taac2026.application.training.cli:main"
taac-evaluate = "taac2026.application.evaluation.cli:main"
taac-search = "taac2026.application.search.cli:main"
taac-clean-pycache = "taac2026.application.maintenance.clean_pycache:main"
taac-plot-model-performance = "taac2026.application.reporting.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"
markers = [
	"unit: fast unit tests for pure logic and local contracts",
	"integration: higher-level workflow tests across module boundaries",
]

[tool.coverage.run]
branch = true
source = [
	"src/taac2026/domain",
	"src/taac2026/application/search",
	"src/taac2026/application/training",
]

[tool.coverage.report]
fail_under = 70
show_missing = true
