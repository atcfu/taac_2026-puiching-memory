{% if page.meta.comments is undefined or page.meta.comments %}
  <h2 id="__comments">{{ lang.t("meta.comments") }}</h2>
  <script
    src="https://giscus.app/client.js"
    data-repo="Puiching-Memory/TAAC_2026"
    data-repo-id="R_kgDORqM4DA"
    data-category="Announcements"
    data-category-id="DIC_kwDORqM4DM4C6ZM0"
    data-mapping="pathname"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="bottom"
    data-theme="light"
    data-lang="zh-CN"
    crossorigin="anonymous"
    async
  ></script>

  <script>
    function taacGiscusTheme() {
      var palette = typeof __md_get === "function" ? __md_get("__palette") : null
      if (palette && typeof palette.color === "object") {
        return palette.color.scheme === "slate"
          ? "transparent_dark"
          : "light"
      }
      return "light"
    }

    var giscus = document.querySelector("script[src*=giscus]")
    if (giscus) {
      giscus.setAttribute("data-theme", taacGiscusTheme())
    }

    document.addEventListener("DOMContentLoaded", function() {
      var ref = document.querySelector("[data-md-component=palette]")
      if (!ref) {
        return
      }

      ref.addEventListener("change", function() {
        var frame = document.querySelector(".giscus-frame")
        if (!frame || !frame.contentWindow) {
          return
        }

        frame.contentWindow.postMessage(
          { giscus: { setConfig: { theme: taacGiscusTheme() } } },
          "https://giscus.app"
        )
      })
    })
  </script>
{% endif %}
