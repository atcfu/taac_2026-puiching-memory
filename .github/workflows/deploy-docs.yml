name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-docs.yml"
      - "docs/**"
      - "zensical.toml"
      - "src/taac2026/reporting/**"
      - "src/taac2026/application/reporting/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://puiching-memory.github.io/TAAC_2026/

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install project dependencies
        run: uv sync --locked

      - name: Generate EDA figures
        run: uv run taac-dataset-eda

      - name: Generate tech timeline
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: uv run taac-tech-timeline

      - name: Build Zensical site
        run: uv run --no-project --isolated --with zensical zensical build --clean

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
