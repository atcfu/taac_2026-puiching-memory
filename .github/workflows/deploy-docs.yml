name: 部署文档

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-docs.yml"
      - "docs/**"
      - "zensical.toml"
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  classify-push:
    name: 分类推送触发器
    runs-on: ubuntu-latest
    outputs:
      allow_push_deploy: ${{ steps.classify.outputs.allow_push_deploy }}

    steps:
      - name: 检出仓库
        if: github.event_name == 'push'
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: 分类推送变更
        id: classify
        run: |
          allow_push_deploy=true
          if [[ "${{ github.event_name }}" == "push" ]]; then
            changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
            if echo "$changed_files" | grep -Eq '^(\.github/workflows/ci\.yml|config/|src/|tests/|pyproject\.toml$|uv\.lock$)'; then
              allow_push_deploy=false
            fi
          fi
          echo "allow_push_deploy=$allow_push_deploy" >> "$GITHUB_OUTPUT"

  deploy:
    needs:
      - classify-push
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name != 'workflow_run' && needs.classify-push.outputs.allow_push_deploy == 'true')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://puiching-memory.github.io/TAAC_2026/

    steps:
      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v6

      - name: 检出仓库
        uses: actions/checkout@v5
        with:
          lfs: true
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: 设置 uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: 安装项目依赖 (轻量级)
          run: uv sync --locked --extra cuda126 --no-install-package torch --no-install-package torchrec --no-install-package fbgemm-gpu

      - name: 构建 Zensical 站点
        run: uv run --no-project --isolated --with zensical zensical build --clean

      - name: 上传站点制品
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: 部署 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
