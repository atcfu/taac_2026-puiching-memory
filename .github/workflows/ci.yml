name: CI

on:
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "config/**"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "config/**"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit, Integration, and Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync project environment
        run: uv sync --locked

      - name: Run unit tests with coverage
        run: uv run --with coverage coverage run -m pytest -m unit -v

      - name: Run integration tests with coverage
        run: uv run --with coverage coverage run --append -m pytest -m integration -v

      - name: Enforce coverage gate
        run: uv run --with coverage coverage report

      - name: Export coverage XML
        if: always()
        run: uv run --with coverage coverage xml -o coverage.xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
