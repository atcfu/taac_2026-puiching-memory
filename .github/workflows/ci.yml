name: CI

on:
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "config/**"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "config/**"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

env:
  CI_CANONICAL_PYTHON_VERSION: "3.13"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  style:
    name: 代码风格与策略 (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: 检出仓库
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: 设置 uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: 运行 Ruff 风格检查
        run: uv run --with ruff ruff check .

  test:
    name: CPU 单元测试 (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: 检出仓库
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: 设置 uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: 同步项目环境
        run: uv sync --locked --extra cuda126 --no-install-package torchrec --no-install-package fbgemm-gpu

      - name: 运行仓库策略检查
        run: uv run pytest tests/unit/test_repo_policy.py -q

      - name: 运行带有覆盖率的单元测试
        run: uv run --with coverage coverage run --data-file=.coverage.cpu -m pytest -m unit -v

      - name: 上传 CPU 覆盖率数据
        if: always() && matrix.python-version == env.CI_CANONICAL_PYTHON_VERSION
        uses: actions/upload-artifact@v7
        with:
          name: coverage-cpu-data-py${{ env.CI_CANONICAL_PYTHON_VERSION }}
          path: .coverage.cpu
          include-hidden-files: true
          if-no-files-found: error

  coverage:
    name: 覆盖率报告
    runs-on: ubuntu-latest
    needs:
      - test
    env:
      CPU_COVERAGE_INCLUDE: src/taac2026/domain/*,src/taac2026/application/training/__init__.py,src/taac2026/application/training/cli.py,src/taac2026/application/training/runtime_optimization.py

    steps:
      - name: 检出仓库
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.CI_CANONICAL_PYTHON_VERSION }}

      - name: 设置 uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: 下载 CPU 覆盖率数据
        uses: actions/download-artifact@v8
        with:
          name: coverage-cpu-data-py${{ env.CI_CANONICAL_PYTHON_VERSION }}
          path: .coverage-artifacts/cpu

      - name: 恢复覆盖率数据
        run: |
          cp .coverage-artifacts/cpu/.coverage.cpu .coverage

      - name: 总结覆盖率范围
        run: |
          {
            echo "## 覆盖率范围"
            echo
            echo "- 兼容性检查在 Python 3.10, 3.11, 3.12, 和 3.13 上运行"
            echo "- 覆盖率门控从规范的 Python ${CI_CANONICAL_PYTHON_VERSION} 单元测试通道执行，仅使用 CPU 安全的模块"
            echo "- 包含: src/taac2026/domain/*, src/taac2026/application/training/__init__.py, src/taac2026/application/training/cli.py, src/taac2026/application/training/runtime_optimization.py"
            echo "- 集成和 GPU 覆盖率在需要时从本地 CUDA CLI 运行中收集"
            echo "- 仅 GPU 的基准测试位于 tests/benchmarks/gpu 下，通过本地 CUDA CLI 运行"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 执行 CPU 覆盖率门控
        run: uv run --with coverage coverage report --fail-under=70 --include="$CPU_COVERAGE_INCLUDE"

      - name: 导出 CPU 覆盖率 XML
        if: always()
        run: uv run --with coverage coverage xml --fail-under=0 --include="$CPU_COVERAGE_INCLUDE" -o coverage.xml

      - name: 上传覆盖率制品
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
