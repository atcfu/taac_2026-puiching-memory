name: Performance Benchmarks

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: performance-benchmarks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: GPU Performance Benchmarks
    runs-on: [self-hosted, gpu, linux]
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Restore benchmark charts cache
        id: cache-benchmark-charts
        uses: actions/cache/restore@v5
        with:
          path: docs/assets/figures/benchmarks
          key: ${{ runner.os }}-docs-bench-${{ github.sha }}

      - name: Sync project environment
        run: uv sync --locked

      - name: Run benchmark suite
        run: |
          rm -rf .benchmarks outputs/performance benchmark-result.json
          uv run pytest tests/benchmarks/gpu -m benchmark_gpu --benchmark-json=benchmark-result.json -v

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: pytest
          output-file-path: benchmark-result.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "115%"
          comment-on-alert: true
          fail-on-alert: true

      - name: Generate benchmark charts
        run: uv run taac-bench-report --input benchmark-result.json

      - name: Save benchmark charts cache
        if: steps.cache-benchmark-charts.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: docs/assets/figures/benchmarks
          key: ${{ runner.os }}-docs-bench-${{ github.sha }}

      - name: Summarize benchmark evidence
        run: |
          uv run python - <<'PY'
          import json
          import os
          from pathlib import Path

          from tests import conftest

          performance_dir = Path("outputs/performance")
          counts = conftest.count_classified_test_files()
          payloads = sorted(path.name for path in performance_dir.glob("*.json"))
          trace = {
              "store_result_enabled": True,
              "alert_threshold_percent": 115,
              "comment_on_alert": True,
              "fail_on_alert": True,
            "benchmark_gpu_files": counts["benchmark_gpu"],
            "performance_payloads": payloads,
              "artifacts": [
                  "benchmark-result.json",
                  "outputs/performance",
                  "docs/assets/figures/benchmarks",
              ],
          }
          Path("benchmark-trace.json").write_text(json.dumps(trace, indent=2, sort_keys=True), encoding="utf-8")

          embedding_torchrec = None
          attention_triton = None
          embedding_path = performance_dir / "embedding_lookup_torchrec.json"
          attention_path = performance_dir / "attention_forward_triton.json"
          if embedding_path.exists():
            embedding_torchrec = json.loads(embedding_path.read_text(encoding="utf-8"))
          if attention_path.exists():
            attention_triton = json.loads(attention_path.read_text(encoding="utf-8"))

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("## Benchmark evidence\n\n")
              handle.write(f"- store benchmark history: {trace['store_result_enabled']} (alert threshold 115%, comment-on-alert=true, fail-on-alert=true)\\n")
            handle.write(f"- executed marker: benchmark_gpu ({counts['benchmark_gpu']} files) on the self-hosted GPU runner\\n")
            if embedding_torchrec is not None:
              handle.write(f"- TorchRec embedding throughput: {embedding_torchrec['throughput']:.2f} lookups/s\\n")
            if attention_triton is not None:
              handle.write(f"- Triton attention median latency: {attention_triton['median_ms']:.4f} ms\\n")
            handle.write(f"- performance payloads: {', '.join(payloads) if payloads else 'none'}\\n")
              handle.write("- artifacts: benchmark-result.json, outputs/performance/, docs/assets/figures/benchmarks/\\n")
          PY

      - name: Upload benchmark raw results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-raw-results
          path: |
            benchmark-result.json
            outputs/performance

      - name: Upload benchmark charts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-charts
          path: docs/assets/figures/benchmarks

      - name: Upload benchmark trace
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-trace
          path: benchmark-trace.json