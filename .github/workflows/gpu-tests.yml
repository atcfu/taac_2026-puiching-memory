name: GPU Tests

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gpu-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gpu-test:
    name: GPU Integration & Triton Kernels
    runs-on: [self-hosted, gpu, linux]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Sync project environment
        run: uv sync --locked

      - name: Capture GPU runtime evidence
        env:
          TAAC_GPU_ENV_REPORT_PATH: gpu-env-report.json
        run: uv run pytest tests/gpu/test_gpu_environment.py -q

      - name: Run integration and GPU tests with coverage
        run: uv run --with coverage coverage run --data-file=.coverage.gpu -m pytest -m "integration or gpu" -v

      - name: Summarize GPU evidence
        run: |
          uv run python - <<'PY'
          import json
          import os
          from pathlib import Path

          from tests import conftest

          report = json.loads(Path("gpu-env-report.json").read_text(encoding="utf-8"))
          counts = conftest.count_classified_test_files()
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("## GPU runtime evidence\n\n")
              handle.write("- verifier: tests/gpu/test_gpu_environment.py (same probe used by .devcontainer/post-create.sh)\\n")
              handle.write(f"- device: {report['device']}\\n")
              handle.write(f"- torch / torchrec / fbgemm / triton: {report['torch']} / {report['torchrec']} / {report['fbgemm_gpu']} / {report['triton']}\\n")
              handle.write(f"- executed markers: integration ({counts['integration']} files) + gpu ({counts['gpu']} files)\\n")
              handle.write(f"- delegated to performance-benchmarks.yml: benchmark_gpu ({counts['benchmark_gpu']} files)\\n")
              handle.write(f"- embedding probe: {report['embedding_probe']}\\n")
          PY

      - name: Upload GPU coverage data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-gpu-data
          path: .coverage.gpu
          include-hidden-files: true
          if-no-files-found: error

      - name: Upload GPU runtime evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gpu-runtime-evidence
          path: gpu-env-report.json