[project]
site_name = "TAAC 2026 Docs"
site_description = "TAAC 2026 训练框架、实验包与开发约定"
site_author = "TAAC 2026 Team"
site_url = "https://puiching-memory.github.io/TAAC_2026/"
repo_url = "https://github.com/Puiching-Memory/TAAC_2026"
repo_name = "Puiching-Memory/TAAC_2026"
edit_uri = "edit/main/docs/"

extra_css = ["assets/stylesheets/extra.css"]
extra_javascript = [
    "assets/javascripts/mathjax.js",
    { path = "https://cdn.jsdelivr.net/npm/mathjax@4.1.1/tex-mml-chtml.js", async = true },
    { path = "https://cdn.jsdelivr.net/npm/echarts@6.0.0/dist/echarts.min.js", async = true },
    "assets/javascripts/echarts-fence.js",
]

nav = [
    { "首页" = "index.md" },
    { "快速开始" = "getting-started.md" },
    { "架构与概念" = "architecture.md" },
    { "实验包" = [
        { "总览" = "experiments/index.md" },
        { "Baseline" = "experiments/baseline.md" },
        { "Symbiosis" = "experiments/symbiosis.md" },
        { "CTR Baseline" = "experiments/ctr-baseline.md" },
        { "DeepContextNet" = "experiments/deepcontextnet.md" },
        { "HyFormer" = "experiments/hyformer.md" },
        { "InterFormer" = "experiments/interformer.md" },
        { "OneTrans" = "experiments/onetrans.md" },
        { "UniRec" = "experiments/unirec.md" },
        { "UniScaleFormer" = "experiments/uniscaleformer.md" },
    ] },
    { "数据集分析" = [
        { "总览" = "analysis/index.md" },
        { "EDA 报告" = "analysis/dataset-eda.md" },
        { "性能基准" = "analysis/benchmarks.md" },
        { "评估指标分析" = "analysis/evaluation.md" },
        { "TAAC 2025 论文洞察" = "analysis/taac2025-insights.md" },
    ] },
    { "指南" = [
        { "官方平台用户指南" = "guide/official-competition-docs.md" },
        { "线上训练打包" = "guide/online-training-bundle.md" },
        { "比赛线上服务器设备信息" = "guide/competition-online-server.md" },
        { "超参数搜索" = "guide/search.md" },
        { "测试" = "guide/testing.md" },
        { "Triton Kernel 开发" = "guide/triton-kernels.md" },
        { "仓库缓存清理" = "guide/cache-cleanup.md" },
        { "仓库日志管理" = "guide/repo-log-management.md" },
        { "本地生成站点" = "guide/local-site.md" },
        { "新增实验包" = "guide/contributing.md" },
    ] },
    { "想法" = [
        { "索引" = "ideas/index.md" },
        { "特征Token化·长序列注意力·辅助Loss" = "ideas/posts/001-rec-model-work-summary.md" },
        { "腾讯广告算法大赛 2025 官方论文解读：全模态生成式推荐" = "ideas/posts/002-taac2025-competition-paper.md" },
    ] },
    { "论文" = [
        { "技术发展时间线" = "papers/index.md" },
        { "HyFormer" = "papers/hyformer.md" },
        { "InterFormer" = "papers/interformer.md" },
        { "OneTrans" = "papers/onetrans.md" },
        { "TAAC 2025 全模态生成式推荐" = "papers/taac2025.md" },
    ] },
]

# --------------------------------------------------------------------------
# Theme
# --------------------------------------------------------------------------
[project.theme]
language = "zh"
custom_dir = "docs/overrides"

features = [
    "content.action.edit",
    "content.action.view",
    "content.code.copy",
    "content.code.select",
    "content.tabs.link",
    "content.tooltips",
    "content.footnote.tooltips",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.sections",
    "navigation.expand",
    "navigation.path",
    "navigation.top",
    "navigation.tracking",
    "navigation.instant",
    "navigation.instant.prefetch",
    "search.highlight",
    "toc.follow",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.theme.font]
text = "IBM Plex Sans"
code = "JetBrains Mono"

[[project.theme.palette]]
scheme = "default"
primary = "blue grey"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "切换到深色模式"

[[project.theme.palette]]
scheme = "slate"
primary = "blue grey"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "切换到浅色模式"
